<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>选房对比 / House Compare</title>
<style>
  :root {
    --bg: #f5f5f0;
    --card: #ffffff;
    --text: #1a1a1a;
    --text2: #666;
    --border: #e8e8e3;
    --accent: #2d2d2d;
    --accent-light: #f0efe9;
    --tag: #e8e7e0;
    --radius: 12px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-lg: 0 10px 40px rgba(0,0,0,0.08);
    --success: #2d8a4e;
    --danger: #c0392b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", "PingFang SC", "Noto Sans SC", sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* Header */
  .header { text-align: center; padding: 48px 24px 24px; }
  .header h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.5px; margin-bottom: 6px; }
  .header p { color: var(--text2); font-size: 14px; }

  /* Language Toggle */
  .lang-toggle {
    position: fixed; top: 16px; right: 16px; z-index: 200;
    display: flex; gap: 0; border-radius: 8px; overflow: hidden;
    border: 1px solid var(--border); background: var(--card);
    box-shadow: var(--shadow);
  }
  .lang-toggle button {
    padding: 6px 14px; font-size: 13px; border: none; cursor: pointer;
    background: transparent; color: var(--text2); transition: all 0.15s;
  }
  .lang-toggle button.active { background: var(--accent); color: #fff; }

  /* Save Status */
  .save-status {
    position: fixed; top: 16px; left: 16px; z-index: 200;
    padding: 6px 14px; border-radius: 8px; font-size: 12px;
    background: var(--card); border: 1px solid var(--border);
    box-shadow: var(--shadow); color: var(--text2);
    transition: all 0.3s; opacity: 0; transform: translateY(-8px);
  }
  .save-status.show { opacity: 1; transform: translateY(0); }
  .save-status.saved { color: var(--success); border-color: var(--success); }

  /* Toast Notification */
  .toast-container {
    position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
    z-index: 9999; display: flex; flex-direction: column; align-items: center; gap: 8px;
    pointer-events: none;
  }
  .toast {
    padding: 12px 24px; border-radius: 10px; font-size: 14px; font-weight: 500;
    color: #fff; box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    opacity: 0; transform: translateY(-16px) scale(0.95);
    transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    pointer-events: auto; white-space: nowrap;
    display: flex; align-items: center; gap: 8px;
  }
  .toast.show { opacity: 1; transform: translateY(0) scale(1); }
  .toast.success { background: linear-gradient(135deg, #2d8a4e, #34a853); }
  .toast.info { background: linear-gradient(135deg, #2d5aa8, #4285f4); }
  .toast.error { background: linear-gradient(135deg, #c0392b, #e74c3c); }
  .toast .toast-icon { font-size: 18px; }

  /* Toolbar */
  .toolbar {
    display: flex; justify-content: center; gap: 8px;
    padding: 0 24px 28px; flex-wrap: wrap;
  }
  .toolbar button {
    background: var(--card); border: 1px solid var(--border);
    padding: 8px 16px; border-radius: 8px; font-size: 13px;
    color: var(--text); cursor: pointer; transition: all 0.15s;
  }
  .toolbar button:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .toolbar button.primary-btn { background: var(--accent); color: #fff; border-color: var(--accent); }
  .toolbar button.primary-btn:hover { opacity: 0.85; }
  .toolbar button.danger-btn { color: var(--danger); border-color: var(--danger); }
  .toolbar button.danger-btn:hover { background: var(--danger); color: #fff; }
  .toolbar button.whatsapp-btn { background: #25D366; color: #fff; border-color: #25D366; }
  .toolbar button.whatsapp-btn:hover { background: #1da851; }

  /* Grid */
  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 20px; padding: 0 24px 60px; max-width: 1400px; margin: 0 auto;
  }

  /* Card */
  .card {
    background: var(--card); border-radius: var(--radius);
    border: 1px solid var(--border); overflow: hidden;
    transition: box-shadow 0.2s, transform 0.2s;
  }
  .card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
  .card-header {
    padding: 24px 24px 16px; display: flex;
    justify-content: space-between; align-items: flex-start;
  }
  .card-header h2 { font-size: 18px; font-weight: 600; line-height: 1.3; }
  .card-header .price {
    font-size: 18px; font-weight: 600; color: var(--accent);
    white-space: nowrap; margin-left: 12px;
  }
  .card-meta { padding: 0 24px 16px; display: flex; gap: 6px; flex-wrap: wrap; }
  .tag {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--tag); color: var(--text2);
    padding: 4px 10px; border-radius: 6px; font-size: 12px;
  }
  .card-notes { padding: 0 24px 12px; color: var(--text2); font-size: 13px; line-height: 1.5; }
  .card-link { padding: 0 24px 16px; }
  .card-link a {
    color: var(--accent); font-size: 13px; text-decoration: none;
    border-bottom: 1px solid var(--border); padding-bottom: 1px;
  }
  .card-link a:hover { border-color: var(--accent); }

  /* Card Actions */
  .card-actions { padding: 0 24px 8px; display: flex; gap: 6px; }
  .card-actions button {
    background: none; border: 1px solid var(--border); border-radius: 6px;
    padding: 4px 10px; font-size: 12px; cursor: pointer;
    color: var(--text2); transition: all 0.15s;
  }
  .card-actions button:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* Expand */
  .expand-btn {
    display: flex; align-items: center; justify-content: center;
    gap: 6px; width: 100%; padding: 12px; background: none;
    border: none; border-top: 1px solid var(--border);
    color: var(--text2); font-size: 13px; cursor: pointer;
    transition: background 0.15s;
  }
  .expand-btn:hover { background: var(--accent-light); }
  .expand-btn .arrow { display: inline-block; transition: transform 0.25s; font-size: 11px; }
  .expand-btn.open .arrow { transform: rotate(180deg); }
  .card-detail { display: none; border-top: 1px solid var(--border); }
  .card-detail.show { display: block; }

  /* Area Section */
  .area-section { padding: 20px 24px; border-bottom: 1px solid var(--border); }
  .area-section:last-child { border-bottom: none; }
  .area-section h3 {
    font-size: 14px; font-weight: 600; margin-bottom: 12px;
    display: flex; align-items: center; gap: 6px;
  }
  .area-images {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 8px; margin-bottom: 10px;
  }
  .area-images .img-slot {
    aspect-ratio: 4/3; border-radius: 8px; overflow: hidden;
    position: relative; background: var(--accent-light);
    border: 1px dashed var(--border); cursor: pointer;
    transition: border-color 0.15s;
  }
  .area-images .img-slot:hover { border-color: var(--text2); }
  .area-images .img-slot img { width: 100%; height: 100%; object-fit: cover; }
  .area-images .img-slot .add-icon {
    position: absolute; inset: 0; display: flex;
    align-items: center; justify-content: center;
    color: var(--text2); font-size: 24px; font-weight: 300;
  }
  .area-images .img-slot.has-img .add-icon { display: none; }
  .area-images .img-slot .remove-btn {
    display: none; position: absolute; top: 4px; right: 4px;
    width: 20px; height: 20px; border-radius: 50%;
    background: rgba(0,0,0,0.5); color: #fff; border: none;
    font-size: 12px; cursor: pointer; align-items: center;
    justify-content: center; line-height: 1;
  }
  .area-images .img-slot.has-img:hover .remove-btn { display: flex; }
  .area-desc {
    width: 100%; min-height: 36px; border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 10px; font-size: 13px;
    font-family: inherit; resize: vertical; color: var(--text);
    background: transparent; line-height: 1.5;
  }
  .area-desc:focus { outline: none; border-color: var(--accent); }

  /* Add Area */
  .add-area-btn {
    display: flex; align-items: center; justify-content: center;
    gap: 4px; width: 100%; padding: 14px; background: none;
    border: none; border-top: 1px solid var(--border);
    color: var(--text2); font-size: 13px; cursor: pointer;
    transition: background 0.15s;
  }
  .add-area-btn:hover { background: var(--accent-light); }

  /* Video */
  .video-section { padding: 20px 24px; border-bottom: 1px solid var(--border); }
  .video-section h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .video-wrapper {
    position: relative; border-radius: 8px; overflow: hidden;
    background: var(--accent-light); border: 1px dashed var(--border);
    min-height: 120px; display: flex; align-items: center;
    justify-content: center; cursor: pointer; transition: border-color 0.15s;
  }
  .video-wrapper:hover { border-color: var(--text2); }
  .video-wrapper video { width: 100%; border-radius: 8px; display: block; }
  .video-wrapper .video-placeholder { text-align: center; color: var(--text2); padding: 24px; }
  .video-placeholder .v-icon { font-size: 28px; margin-bottom: 6px; }
  .video-placeholder p { font-size: 13px; }
  .video-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .video-actions button {
    background: none; border: 1px solid var(--border); border-radius: 6px;
    padding: 5px 12px; font-size: 12px; cursor: pointer;
    color: var(--text2); transition: all 0.15s;
  }
  .video-actions button:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .video-url-input { display: none; margin-top: 8px; }
  .video-url-input.show { display: flex; gap: 6px; }
  .video-url-input input {
    flex: 1; padding: 6px 10px; border: 1px solid var(--border);
    border-radius: 6px; font-size: 13px; font-family: inherit;
    color: var(--text); background: transparent;
  }
  .video-url-input input:focus { outline: none; border-color: var(--accent); }
  .video-url-input button {
    padding: 6px 14px; border: 1px solid var(--border);
    border-radius: 6px; background: var(--accent); color: #fff;
    font-size: 13px; cursor: pointer; white-space: nowrap;
  }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.4); z-index: 100;
    align-items: center; justify-content: center; padding: 24px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--card); border-radius: var(--radius);
    padding: 28px; width: 100%; max-width: 480px;
    box-shadow: var(--shadow-lg); max-height: 90vh; overflow-y: auto;
  }
  .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
  .modal label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 4px; margin-top: 12px; }
  .modal label:first-of-type { margin-top: 0; }
  .modal input, .modal textarea {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border);
    border-radius: 6px; font-size: 14px; font-family: inherit;
    color: var(--text); background: transparent;
  }
  .modal input:focus, .modal textarea:focus { outline: none; border-color: var(--accent); }
  .modal textarea { resize: vertical; min-height: 60px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
  .modal-actions button {
    padding: 8px 20px; border-radius: 6px; font-size: 14px;
    cursor: pointer; border: 1px solid var(--border);
    background: var(--card); color: var(--text); transition: all 0.15s;
  }
  .modal-actions button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .modal-actions button:hover { opacity: 0.85; }

  /* Progress bar for export */
  .progress-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); z-index: 300;
    align-items: center; justify-content: center;
  }
  .progress-overlay.show { display: flex; }
  .progress-box {
    background: var(--card); border-radius: var(--radius);
    padding: 32px; min-width: 320px; text-align: center;
    box-shadow: var(--shadow-lg);
  }
  .progress-box h3 { margin-bottom: 16px; font-size: 16px; }
  .progress-bar {
    height: 6px; background: var(--border); border-radius: 3px;
    overflow: hidden; margin-bottom: 12px;
  }
  .progress-bar .fill {
    height: 100%; background: var(--accent); border-radius: 3px;
    transition: width 0.3s; width: 0%;
  }
  .progress-box p { font-size: 13px; color: var(--text2); }

  /* Share Result Modal */
  .share-result { text-align: center; }
  .share-result .check-icon { font-size: 48px; margin-bottom: 12px; }
  .share-result h3 { margin-bottom: 8px; }
  .share-result p { color: var(--text2); font-size: 13px; margin-bottom: 20px; line-height: 1.6; }
  .share-result .share-buttons { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .share-result .share-buttons button {
    padding: 10px 20px; border-radius: 8px; font-size: 14px;
    cursor: pointer; border: none; display: flex; align-items: center; gap: 6px;
    transition: all 0.15s; font-weight: 500;
  }
  .share-result .share-buttons .whatsapp-share-btn {
    background: #25D366; color: #fff;
  }
  .share-result .share-buttons .whatsapp-share-btn:hover { background: #1da851; }
  .share-result .share-buttons .copy-btn {
    background: var(--accent); color: #fff;
  }
  .share-result .share-buttons .copy-btn:hover { opacity: 0.85; }
  .share-result .share-buttons .close-btn {
    background: var(--border); color: var(--text);
  }

  .hidden-input { display: none; }

  /* View mode (read-only) */
  body.view-mode .toolbar,
  body.view-mode .card-actions,
  body.view-mode .expand-btn + .card-detail .add-area-btn,
  body.view-mode .video-actions,
  body.view-mode .area-images .img-slot:not(.has-img),
  body.view-mode .area-images .img-slot .remove-btn,
  body.view-mode .save-status,
  body.view-mode .lang-toggle { display: none !important; }
  body.view-mode .area-desc { pointer-events: none; border-color: transparent; padding: 8px 0; }
  body.view-mode .card { cursor: default; }
  body.view-mode .card:hover { transform: none; box-shadow: var(--shadow); }

  /* Responsive */
  @media (max-width: 768px) {
    .grid { grid-template-columns: 1fr; }
    .header { padding: 40px 20px 20px; }
    .header h1 { font-size: 22px; }
    .grid { padding: 0 16px 40px; }
    .area-images { grid-template-columns: repeat(3, 1fr); }
    .lang-toggle { top: 12px; right: 12px; }
    .save-status { top: 12px; left: 12px; }
  }
</style>
</head>
<body>

<div class="save-status" id="saveStatus">
  <span id="saveStatusText"></span>
</div>

<div class="lang-toggle">
  <button id="langZh" onclick="setLang('zh')" class="active">中文</button>
  <button id="langEn" onclick="setLang('en')">EN</button>
</div>

<div class="toast-container" id="toastContainer"></div>

<div class="header">
  <h1 id="t_title">🏠 选房对比</h1>
  <p id="t_subtitle">点击展开查看各区域详情 · 图片/视频点击添加 · 自动保存</p>
</div>

<div class="toolbar">
  <button onclick="addCard()" id="t_addOption">＋ 添加选项</button>
  <button onclick="expandAll()" id="t_expandAll">全部展开</button>
  <button onclick="collapseAll()" id="t_collapseAll">全部收起</button>
  <button onclick="exportShare()" class="primary-btn" id="t_exportShare">🔗 导出可分享页面</button>
  <button onclick="exportJSON()" id="t_exportJSON">💾 导出JSON</button>
  <button onclick="importJSON()" id="t_importJSON">📂 导入JSON</button>
  <button onclick="clearAll()" class="danger-btn" id="t_clearAll">🗑️ 清空全部</button>
  <input type="file" id="loadFile" class="hidden-input" accept=".json" onchange="handleLoadFile(event)">
</div>

<div class="grid" id="grid"></div>

<!-- Add Card Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h3 id="t_modalAddTitle">添加新选项</h3>
    <label id="t_labelName">名称 *</label>
    <input id="m_name" placeholder="如：海景民宿A / e.g. Seaside Villa A">
    <label id="t_labelPrice">价格</label>
    <input id="m_price" placeholder="如：¥388/晚 / ¥388/night">
    <label id="t_labelLocation">位置</label>
    <input id="m_location" placeholder="如：三亚湾 / Sanya Bay">
    <label id="t_labelRoomType">房型</label>
    <input id="m_roomType" placeholder="如：三室一厅 · 可住6人 / 3BR · 6 guests">
    <label id="t_labelLink">平台链接</label>
    <input id="m_link" placeholder="https://...">
    <label id="t_labelNotes">备注</label>
    <textarea id="m_notes" placeholder="补充说明... / Notes..."></textarea>
    <div class="modal-actions">
      <button onclick="closeModal()" id="t_btnCancel">取消</button>
      <button class="primary" onclick="confirmAdd()" id="t_btnAdd">添加</button>
    </div>
  </div>
</div>

<!-- Area Name Modal -->
<div class="modal-overlay" id="areaModal">
  <div class="modal">
    <h3 id="t_modalAreaTitle">添加区域</h3>
    <label id="t_labelAreaName">区域名称</label>
    <input id="area_name" placeholder="如：阳台、车库 / Balcony, Garage...">
    <div class="modal-actions">
      <button onclick="closeAreaModal()" id="t_btnAreaCancel">取消</button>
      <button class="primary" onclick="confirmArea()" id="t_btnAreaAdd">添加</button>
    </div>
  </div>
</div>

<!-- Progress Overlay -->
<div class="progress-overlay" id="progressOverlay">
  <div class="progress-box">
    <h3 id="t_exporting">正在导出...</h3>
    <div class="progress-bar"><div class="fill" id="progressFill"></div></div>
    <p id="progressText">准备中...</p>
  </div>
</div>

<!-- Share Result Modal -->
<div class="modal-overlay" id="shareResultModal">
  <div class="modal share-result">
    <div class="check-icon">✅</div>
    <h3 id="t_shareSuccess">导出成功！</h3>
    <p id="t_shareDesc">可分享的 HTML 文件已下载。<br>将该文件发送给对方，即可在 WhatsApp 中直接打开查看。</p>
    <div class="share-buttons">
      <button class="whatsapp-share-btn" onclick="shareViaWhatsApp()">📱 WhatsApp 分享</button>
      <button class="copy-btn" onclick="copyShareLink()">🔗 复制链接</button>
      <button class="copy-btn" onclick="copyShareText()">📋 复制文案</button>
      <button class="close-btn" onclick="closeShareResult()">关闭</button>
    </div>
  </div>
</div>

    toastVideoRemove: '🗑️ 视频已移除',

// ========== IndexedDB ==========
const DB_NAME = 'HouseCompareDB';
const DB_VERSION = 1;
const STORE_NAME = 'data';

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME);
      }
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e.target.error);
  });
}

async function dbPut(key, value) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).put(value, key);
    tx.oncomplete = () => resolve();
    tx.onerror = e => reject(e.target.error);
  });
}

async function dbGet(key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readonly');
    const req = tx.objectStore(STORE_NAME).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = e => reject(e.target.error);
  });
}

async function dbDelete(key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).delete(key);
    tx.oncomplete = () => resolve();
    tx.onerror = e => reject(e.target.error);
  });
}

const DEFAULT_AREAS_ZH = ['卧室', '客厅', '厨房', '卫生间', '阳台', '交通', '周边'];
const DEFAULT_AREAS_EN = ['Bedroom', 'Living Room', 'Kitchen', 'Bathroom', 'Balcony', 'Transport', 'Surroundings'];

function getDefaultAreas() {
  const keys = lang === 'en' ? DEFAULT_AREAS_EN : DEFAULT_AREAS_ZH;
  const areas = {};
  keys.forEach(k => { areas[k] = { images: [], desc: '' }; });
  return areas;
}

let data = [];
let currentCardIdx = null;
let currentAreaKey = null;
let autoSaveTimer = null;
let lastExportedBlob = null;

function genId() { return '_' + Math.random().toString(36).slice(2, 9); }

function createCard(opts = {}) {
  return {
    id: opts.id || genId(),
    name: opts.name || (lang === 'en' ? 'New Option' : '新选项'),
    price: opts.price || '',
    location: opts.location || '',
    roomType: opts.roomType || '',
    link: opts.link || '',
    notes: opts.notes || '',
    videoSrc: opts.videoSrc || '',
    videoType: opts.videoType || '',
    _videoBlob: opts._videoBlob || null,
    _videoBlobType: opts._videoBlobType || '',
    areas: opts.areas || getDefaultAreas(),
  };
}

// ========== Auto Save ==========
function scheduleAutoSave() {
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(async () => {
    await saveToDB();
    showSaveStatus();
  }, 800);
}

async function saveToDB() {
  const meta = data.map(card => ({
    id: card.id,
    name: card.name,
    price: card.price,
    location: card.location,
    roomType: card.roomType,
    link: card.link,
    notes: card.notes,
    videoSrc: card.videoType === 'url' ? card.videoSrc : '',
    videoType: card.videoType === 'url' ? 'url' : '',
    areas: (() => {
      const a = {};
      for (const [k, v] of Object.entries(card.areas)) {
        a[k] = {
          images: v.images.map(s => s.startsWith('data:') ? '__BLOB__' : s),
          desc: v.desc
        };
      }
      return a;
    })()
  }));
  await dbPut('meta', meta);

  for (const card of data) {
    const blobs = {};
    // Store video as raw Blob (not data URL) for cross-browser compatibility
    if (card._videoBlob) {
      blobs._videoBlob = card._videoBlob;
      blobs._videoBlobType = card._videoBlobType || 'video/mp4';
    } else if (card.videoSrc && card.videoSrc.startsWith('data:')) {
      // Legacy: convert data URL to Blob for storage
      var b = dataURLtoBlob(card.videoSrc);
      if (b) { blobs._videoBlob = b; blobs._videoBlobType = b.type || 'video/mp4'; }
    }
    for (const [areaName, areaData] of Object.entries(card.areas)) {
      areaData.images.forEach((src, i) => {
        if (src.startsWith('data:')) {
          blobs[`${areaName}_${i}`] = src;
        }
      });
    }
    if (Object.keys(blobs).length > 0) {
      await dbPut('blob_' + card.id, blobs);
    }
  }
}

async function loadFromDB() {
  const meta = await dbGet('meta');
  if (!meta || !Array.isArray(meta) || meta.length === 0) return false;

  data = [];
  for (const m of meta) {
    const blobs = await dbGet('blob_' + m.id) || {};
    var videoSrc = '';
    var videoType = '';
    var videoBlob = null;
    var videoBlobType = '';

    if (m.videoType === 'url') {
      videoSrc = m.videoSrc;
      videoType = 'url';
    } else if (blobs._videoBlob) {
      // New format: raw Blob stored in IndexedDB
      videoBlob = blobs._videoBlob;
      videoBlobType = blobs._videoBlobType || 'video/mp4';
      videoSrc = URL.createObjectURL(videoBlob);
      videoType = 'blob';
    } else if (blobs._video) {
      // Legacy: data URL stored, convert to Blob for cross-browser playback
      var blob = dataURLtoBlob(blobs._video);
      if (blob) {
        videoBlob = blob;
        videoBlobType = blob.type || 'video/mp4';
        videoSrc = URL.createObjectURL(blob);
        videoType = 'blob';
      } else {
        videoSrc = blobs._video;
        videoType = 'blob';
      }
    }

    const card = createCard({
      id: m.id, name: m.name, price: m.price,
      location: m.location, roomType: m.roomType,
      link: m.link, notes: m.notes,
      videoSrc: videoSrc,
      videoType: videoType,
      areas: {}
    });
    card._videoBlob = videoBlob;
    card._videoBlobType = videoBlobType;

    for (const [areaName, areaData] of Object.entries(m.areas)) {
      card.areas[areaName] = {
        images: areaData.images.map((s, i) => {
          if (s === '__BLOB__') return blobs[`${areaName}_${i}`] || '';
          return s;
        }),
        desc: areaData.desc
      };
    }
    const defaults = lang === 'en' ? DEFAULT_AREAS_EN : DEFAULT_AREAS_ZH;
    defaults.forEach(d => {
      if (!card.areas[d]) card.areas[d] = { images: [], desc: '' };
    });
    data.push(card);
  }
  return true;
}

// ========== Blob Helpers ==========
function dataURLtoBlob(dataURL) {
  try {
    var parts = dataURL.split(',');
    var mime = parts[0].match(/:(.*?);/)[1] || 'video/mp4';
    var raw = atob(parts[1]);
    var arr = new Uint8Array(raw.length);
    for (var i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
    return new Blob([arr], { type: mime });
  } catch (e) { return null; }
}

function blobToDataURL(blob) {
  return new Promise(function(resolve, reject) {
    var reader = new FileReader();
    reader.onload = function() { resolve(reader.result); };
    reader.onerror = function() { reject(reader.error); };
    reader.readAsDataURL(blob);
  });
}

function revokeVideoBlobURL(card) {
  if (card.videoType === 'blob' && card.videoSrc && card.videoSrc.startsWith('blob:')) {
    URL.revokeObjectURL(card.videoSrc);
  }
}

    el.dataset.id = card.id;

    if (card.roomType) tags += `<span class="tag">${t('tagRoom')}${card.roomType}</span>`;

    let areasHtml = '';
    for (const [areaName, areaData] of Object.entries(card.areas)) {
      let imgsHtml = '';
      areaData.images.forEach((src, ii) => {
        imgsHtml += `
          <div class="img-slot has-img" onclick="pickImage(${ci},'${areaName}',${ii})">
            <img src="${src}" alt="">
            <button class="remove-btn" onclick="event.stopPropagation();removeImage(${ci},'${areaName}',${ii})">×</button>

      imgsHtml += `
        <div class="img-slot" onclick="pickImage(${ci},'${areaName}',${areaData.images.length})">

        </div>`;

      areasHtml += `

    }

    const videoHtml = card.videoSrc

             <p>${t('clickUpload')}</p>

      ${card.link ? `<div class="card-link"><a href="${card.link}" target="_blank">${t('viewLink')}</a></div>` : ''}
      <div class="card-actions">
        <button onclick="editCard(${ci})">${t('edit')}</button>
        <button onclick="removeCard(${ci})">${t('deleteCard')}</button>
      </div>
      <button class="expand-btn" onclick="toggleDetail(this)">

          <h3>${t('videoIntro')}</h3>

function removeCard(ci) {

  const id = data[ci].id;
  revokeVideoBlobURL(data[ci]);
  data.splice(ci, 1);
  dbDelete('blob_' + id);
  render();
  scheduleAutoSave();
  showToast(t('toastCardDeleted'), 'info');
}

// ========== Image Handling ==========
function pickImage(ci, areaName, slotIdx) {
  currentCardIdx = ci;
  currentAreaKey = areaName;
  let input = document.getElementById('file_' + ci);
  if (!input) {
    input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.className = 'hidden-input';
    input.id = 'file_' + ci;
    input.onchange = function(e) { handleImage(e, ci); };
    document.body.appendChild(input);
  }
  input.dataset.slotIdx = slotIdx;
  input.click();
}

function handleImage(e, ci) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const slotIdx = parseInt(e.target.dataset.slotIdx);
    const area = data[ci].areas[currentAreaKey];
    if (slotIdx < area.images.length) {
      area.images[slotIdx] = ev.target.result;
    } else {
      area.images.push(ev.target.result);
    }
    render();
    expandCard(ci);
    scheduleAutoSave();
    showToast(t('toastImageUpload'), 'success');
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function removeImage(ci, areaName, idx) {
  data[ci].areas[areaName].images.splice(idx, 1);
  render();
  expandCard(ci);
  scheduleAutoSave();
}

function updateAreaDesc(ci, areaName, val) {
  data[ci].areas[areaName].desc = val;
  scheduleAutoSave();
}

  data[currentCardIdx].areas[name] = { images: [], desc: '' };

  expandCard(currentCardIdx);
  scheduleAutoSave();
  showToast(t('toastAreaAdded'), 'success');
}

function removeArea(ci, areaName) {
  if (!confirm(t('confirmDeleteArea')(areaName))) return;
  delete data[ci].areas[areaName];
  render();
  expandCard(ci);
  scheduleAutoSave();
  showToast(t('toastAreaRemoved'), 'info');
}

// ========== Video Handling ==========
function pickVideo(ci) {
  const input = document.getElementById('vfile_' + ci);
  if (input) input.click();
}

function handleVideo(e, ci) {
  const file = e.target.files[0];
  if (!file) return;
  // Warn if file is very large
  if (file.size > 500 * 1024 * 1024) {
    showToast(lang === 'en' ? 'Video too large (>500MB)' : '视频文件过大(>500MB)', 'error');
    e.target.value = '';
    return;
  }
  // Store as Blob + Blob URL (works across all browsers)
  revokeVideoBlobURL(data[ci]);
  data[ci]._videoBlob = file;
  data[ci]._videoBlobType = file.type || 'video/mp4';
  data[ci].videoSrc = URL.createObjectURL(file);
  data[ci].videoType = 'blob';
  render();
  expandCard(ci);
  scheduleAutoSave();
  showToast(t('toastVideoUpload'), 'success');
  e.target.value = '';
}

function toggleVideoUrl(ci) {
  const el = document.getElementById('vurl_' + ci);
  el.classList.toggle('show');
  if (el.classList.contains('show')) {
    document.getElementById('vurl_input_' + ci).focus();
  }
}

function setVideoUrl(ci) {
  const url = document.getElementById('vurl_input_' + ci).value.trim();
  if (!url) return;
  data[ci].videoSrc = url;
  data[ci].videoType = 'url';
  render();
  expandCard(ci);
  scheduleAutoSave();
  showToast(t('toastVideoLink'), 'success');
}

function removeVideo(ci) {
  revokeVideoBlobURL(data[ci]);
  data[ci].videoSrc = '';
  data[ci].videoType = '';
  data[ci]._videoBlob = null;
  data[ci]._videoBlobType = '';
  render();
  expandCard(ci);
  scheduleAutoSave();
  showToast(t('toastVideoRemove'), 'info');
}

function expandCard(ci) {
  const cardEl = document.querySelector(`[data-id="${data[ci].id}"]`);
  if (cardEl) {
    const btn = cardEl.querySelector('.expand-btn');
    btn.classList.add('open');
    btn.nextElementSibling.classList.add('show');
  }
}

// ========== Export Shareable HTML ==========
async function exportShare() {
  const overlay = document.getElementById('progressOverlay');
  const fill = document.getElementById('progressFill');
  const pText = document.getElementById('progressText');
  overlay.classList.add('show');
  fill.style.width = '0%';
  pText.textContent = t('savePreparing');

  await new Promise(r => setTimeout(r, 100));

  // Convert Blob URLs to data URLs for embedding in exported HTML
  const totalCards = data.length;
  let processed = 0;

  for (const card of data) {
    processed++;
    pText.textContent = `${t('saveProcessing')} (${processed}/${totalCards})`;
    fill.style.width = `${(processed / (totalCards + 1)) * 80}%`;

    // Convert video Blob to data URL for export
    if (card._videoBlob && card.videoType === 'blob') {
      try {
        card.videoSrc = await blobToDataURL(card._videoBlob);
      } catch (e) {
        card.videoSrc = '';
      }
    }

    await new Promise(r => setTimeout(r, 50)); // yield to UI
  }

  pText.textContent = t('saveWriting');
  fill.style.width = '90%';
  await new Promise(r => setTimeout(r, 50));

  const shareHTML = buildShareHTML();
  fill.style.width = '100%';
  pText.textContent = t('saveDone');

  lastExportedBlob = new Blob([shareHTML], { type: 'text/html;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(lastExportedBlob);
  a.download = `house-compare_${new Date().toISOString().slice(0,10)}.html`;
  a.click();

  // Restore Blob URLs after export (data URLs were temporarily set for export)
  for (const card of data) {
    if (card._videoBlob && card.videoType === 'blob') {
      card.videoSrc = URL.createObjectURL(card._videoBlob);
    }
  }

  setTimeout(() => {
    overlay.classList.remove('show');
    showToast(t('toastExportDone'), 'success');
    document.getElementById('shareResultModal').classList.add('show');
  }, 800);
}

function closeShareResult() {
  document.getElementById('shareResultModal').classList.remove('show');
}

    'document.addEventListener("click",function(e){var slot=e.target.closest(".img-slot[data-idx]");if(slot){openLightbox(parseInt(slot.getAttribute("data-idx")))}});',
    // Render function: builds HTML using data attributes, no inline JS with quotes
    'function render(){allImages=[];var grid=document.getElementById("grid");grid.innerHTML="";CARDS.forEach(function(card){var tags="";if(card.location)tags+="<span class=\\"tag\\">\u{1f4cd}"+esc(card.location)+"</span>";if(card.roomType)tags+="<span class=\\"tag\\">\ud83d\udecf\ufe0f"+esc(card.roomType)+"</span>";var areasHtml="";var areaKeys=Object.keys(card.areas);for(var ai=0;ai<areaKeys.length;ai++){var areaName=areaKeys[ai];var areaData=card.areas[areaName];var imgsHtml="";for(var ii=0;ii<areaData.images.length;ii++){var src=areaData.images[ii];if(src){allImages.push(src);imgsHtml+="<div class=\\"img-slot\\" data-idx=\\""+(allImages.length-1)+"\\"><img src=\\""+src+"\\" alt=\\"\\"></div>"}}areasHtml+="<div class=\\"area-section\\"><h3>"+(AREA_ICONS[areaName]||"\ud83d\udccc")+" "+esc(areaName)+"</h3><div class=\\"area-images\\">"+imgsHtml+"</div>"+(areaData.desc?"<div class=\\"area-desc\\">"+esc(areaData.desc)+"</div>":"")+"</div>"}var vidHtml="";if(card.videoSrc){var isVid=card.videoType==="blob"||/\\.mp4|\\.webm|\\.ogg/i.test(card.videoSrc)||card.videoSrc.indexOf("data:video")===0;if(isVid){vidHtml="<video controls src=\\""+card.videoSrc+"\\"></video>"}else{vidHtml="<iframe src=\\""+card.videoSrc+"\\" style=\\"width:100%;aspect-ratio:16/9;border:none;\\" allowfullscreen></iframe>"}vidHtml="<div class=\\"video-section\\"><h3>\ud83c\udfac "+VIDEO_LABEL+"</h3><div class=\\"video-wrapper\\">"+vidHtml+"</div></div>"}var el=document.createElement("div");el.className="card";el.innerHTML="<div class=\\"card-header\\"><h2>"+esc(card.name)+"</h2>"+(card.price?"<div class=\\"price\\">"+esc(card.price)+"</div>":"")+"</div>"+(tags?"<div class=\\"card-meta\\">"+tags+"</div>":"")+(card.notes?"<div class=\\"card-notes\\">"+esc(card.notes)+"</div>":"")+(card.link?"<div class=\\"card-link\\"><a href=\\""+esc(card.link)+"\\" target=\\"_blank\\">\ud83d\udd17 "+VIEW_LINK_LABEL+"</a></div>":"")+"<button class=\\"expand-btn\\" onclick=\\"toggleDetail(this)\\"><span class=\\"arrow\\">\u25bc</span> "+EXPAND_LABEL+"</button><div class=\\"card-detail\\">"+vidHtml+areasHtml+"</div>";grid.appendChild(el)})}',
    'render();'
  ].join('\n');

  // Build the final HTML using string concatenation (NO template literals)
  var html = '';
  html += '<!DOCTYPE html>\n';
  html += '<html lang="' + lang + '">\n';

}

// ========== Export/Import JSON ==========
function exportJSON() {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `house-compare_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function importJSON() {
  document.getElementById('loadFile').click();
}

function handleLoadFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const loaded = JSON.parse(ev.target.result);
      data = loaded.map(card => {
        if (!card.id) card.id = genId();
        if (!card.videoSrc) card.videoSrc = '';
        if (!card.videoType) card.videoType = card.videoSrc ? 'url' : '';
        if (!card.areas) card.areas = getDefaultAreas();
        // Convert data URL videos to Blob for cross-browser playback
        if (card.videoSrc && card.videoSrc.startsWith('data:')) {
          var blob = dataURLtoBlob(card.videoSrc);
          if (blob) {
            card._videoBlob = blob;
            card._videoBlobType = blob.type;
            card.videoSrc = URL.createObjectURL(blob);
            card.videoType = 'blob';
          }
        } else {
          card._videoBlob = null;
          card._videoBlobType = '';
        }
        return card;
      });
      render();
      saveToDB();
      showToast(t('toastCardAdded'), 'success');
    } catch (err) {
      alert(t('fileError'));
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function clearAll() {
  if (!confirm(t('confirmClear'))) return;
  data.forEach(function(c) { revokeVideoBlobURL(c); });
  data = [];
  render();
  saveToDB();
}

  applyLang();
  const loaded = await loadFromDB();

    data = [

    ];
  }
  render();
}
